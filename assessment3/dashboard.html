<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
color:white;
}

.card-custom{
background: rgba(255,255,255,0.1);
backdrop-filter: blur(10px);
border-radius:20px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.btn-custom{
background:#ff7eb3;
border:none;
}

.btn-custom:hover{
background:#ff4f91;
}

.header{
text-align:center;
margin-bottom:30px;
}
</style>

</head>
<body>

<div class="container mt-5">

<div class="header">
<h1>Welcome to Dashboard 🚀</h1>
<p>Manage your profile and view your details</p>
</div>

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card-custom text-center">

<h4 class="mb-3">User Panel</h4>

<button class="btn btn-custom w-100 mb-3" onclick="toggleData()">Show / Hide User Data</button>

<div id="userData" class="mt-3"></div>

<button class="btn btn-danger w-100 mt-3" onclick="logout()">Logout</button>

</div>

</div>
</div>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
